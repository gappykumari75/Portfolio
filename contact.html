<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - G_Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white">

    <div id="header-placeholder"></div>
    <section class="py-5 mt-5 pt-5"
        style="background-color: #67717244; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="container text-center py-3">
            <h1 class="display-5 fw-bold text-white mb-2">📞Contact</h1>

            <nav aria-label="breadcrumb" class="d-flex justify-content-center">
                <ol class="breadcrumb mb=0 text-gradient" style="--bs-breadcrumb-divider: '>';">
                    <li class="breadcrumb-item">
                        <a href="index.html" class="text-secondary text-decoration-none">Home</a>
                    </li>
                    <li class="breadcrumb-item active text-info" aria-current="page">Contact</li>
                </ol>
            </nav>
        </div>
    </section>

    <section id="contact-section" class="py-5 mt-5">
        <div class="container">
            <h2 class="text-center display-5 fw-bold mb-3" style="color: #00e5ff;">Get In Touch</h2>
            <p class="text-center text-primary mb-5">💬 Drop a message!!!</p>

            <div class="row g-5 justify-content-center">
                <div class="col-12 col-md-4">
                    <div class="card p-4 h-100 border-0 shadow-sm" style="background-color: #11141a; border-radius: 12px;">
                        <h4 class="fw-bold mb-4" style="color: #00e5ff;">Contact Info</h4>
                        
                        <div class="d-flex align-items-center mb-4">
                            <span style="font-size: 1.5rem; margin-right: 15px;">📞</span>
                            <div>
                                <h6 class="mb-0 text-white fw-bold">Phone</h6>
                                <p class="mb-0 text-muted small">+91 9031833838</p>
                            </div>
                        </div>

                        <div class="d-flex align-items-center mb-4">
                            <span style="font-size: 1.5rem; margin-right: 15px;">📧</span>
                            <div>
                                <h6 class="mb-0 text-white fw-bold">Email</h6>
                                <p class="mb-0 text-muted small">gappykumari75@.com</p>
                            </div>
                        </div>

                        <div class="d-flex align-items-center mb-4">
                            <span style="font-size: 1.5rem; margin-right: 15px;">📍</span>
                            <div>
                                <h6 class="mb-0 text-white fw-bold">Location</h6>
                                <p class="mb-0 text-muted small">Bihar,Patna, India</p>
                            </div>
                        </div>

                        <div class="d-flex align-items-center">
                            <span style="font-size: 1.5rem; margin-right: 15px;">💼</span>
                            <div>
                                <h6 class="mb-0 text-white fw-bold">Availability</h6>
                                <p class="mb-0 text-muted small">Open for Freelance & Full-time</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6">
                    <form id="contact-form" class="p-4" style="background-color: #11141a; border-radius: 12px;">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Full Name</label>
                            <input type="text" class="form-control bg-dark text-white border-0 py-2" placeholder="Your name" style="border-radius: 8px;" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Email Address</label>
                            <input type="email" class="form-control bg-dark text-white border-0 py-2" placeholder="Your email" style="border-radius: 8px;" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Message</label>
                            <textarea class="form-control bg-dark text-white border-0 py-2" rows="4" placeholder="Write your message here..." style="border-radius: 8px;" required></textarea>
                        </div>
                        <button type="submit" 
                                style="background-color: transparent; color: #00e5ff; border: 2px solid #00e5ff; width: 100%; padding: 10px; border-radius: 25px; font-weight: bold; transition: all 0.3s;"
                                onmouseover="this.style.backgroundColor='#00e5ff'; this.style.color='#11141a';"
                                onmouseout="this.style.backgroundColor='transparent'; this.style.color='#00e5ff';">
                            Send Message ⚡
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js">
            </script>
</body>
</html>
