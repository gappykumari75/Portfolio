<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G_Portfolio - Technical Skills</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* Portfolio Dark Theme Custom Styling */
        body {
            background-color: #1a1e29; /* Dark Background */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 50px 0;
        }

        .skills-section {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            color: #00a8ff; /* Bright Blue Accent Color */
            font-weight: 700;
            margin-bottom: 50px;
        }

        /* Skill Card Styling */
        .skill-card {
            background-color: #232936; /* Slightly lighter dark for cards */
            border-radius: 15px;
            padding: 35px 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: 100%;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 168, 255, 0.2);
        }

        .skill-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        /* Specific Icon Colors as per standard/your image */
        .html-icon { color: #e34c26; }
        .css-icon { color: #264de4; }
        .bootstrap-icon { color: #7952b3; }
        .js-icon { color: #f7df1e; }
        .php-icon { color: #777bb4; }
        .mysql-icon { color: #00758f; }
        .python-icon { color: #3776ab; }
        .mongo-icon { color: #4db33d; }

        .skill-name {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Carousel Navigation Buttons Customization */
        .carousel-control-prev, .carousel-control-next {
            width: 5%;
        }
        
        .carousel-control-prev-icon, .carousel-control-next-icon {
            background-color: #00a8ff;
            padding: 20px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<section class="skills-section text-center container">
    <h2 class="section-title">My Technical Skills</h2>

    <div id="skillsCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="4000">
        <div class="carousel-inner">

            <div class="carousel-item active">
                <div class="row px-5 justify-content-center">
                    
                    <div class="col-12 col-sm-6 col-md-3">
                        <div class="skill-card">
                            <i class="fab fa-html5 skill-icon html-icon"></i>
                            <div class="skill-name">HTML5</div>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <div class="skill-card">
                            <i class="fab fa-css3-alt skill-icon css-icon"></i>
                            <div class="skill-name">CSS3</div>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <div class="skill-card">
                            <i class="fab fa-bootstrap skill-icon bootstrap-icon"></i>
                            <div class="skill-name">Bootstrap</div>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <div class="skill-card">
                            <i class="fab fa-js-square skill-icon js-icon"></i>
                            <div class="skill-name">JavaScript</div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="carousel-item">
                <div class="row px-5 justify-content-center">
                    
                    <div class="col-12 col-sm-6 col-md-3">
                        <div class="skill-card">
                            <i class="fab fa-php skill-icon php-icon"></i>
                            <div class="skill-name">PHP</div>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <div class="skill-card">
                            <i class="fas fa-database skill-icon mysql-icon"></i>
                            <div class="skill-name">MySQL</div>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <div class="skill-card">
                            <i class="fab fa-python skill-icon python-icon"></i>
                            <div class="skill-name">Python</div>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <div class="skill-card">
                            <i class="leaf fas fa-leaf skill-icon mongo-icon"></i>
                            <div class="skill-name">MongoDB</div>
                        </div>
                    </div>

                </div>
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#skillsCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#skillsCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
