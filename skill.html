  <style>/* --- SKILLS SECTION STYLING --- */
#skills-page {
  background-color: #0b0f19; /* Dark Premium Background */
}

.section-title {
  color: #00e5ff;
  text-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
}

/* Slide Transition Magic (Makkhan jaisa transition) */
.custom-skills-carousel .carousel-item {
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) !important;
}

/* Premium Glassmorphism Skill Card Base */
.skill-card {
  background: rgba(255, 255, 255, 0.03) !important;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.08) !important;
  border-radius: 16px !important;
  padding: 30px 20px;
  height: 100%;
  text-align: center;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2) !important;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) !important; /* Fast smooth scale hover */
}

.skill-name {
  color: #ffffff;
  font-weight: 600;
  margin-bottom: 0;
}

.skill-icon {
  font-size: 2.8rem;
  display: inline-block;
}

/* --- HOVER EFFECT AND INDIVIDUAL GLOWS --- */
.skill-card:hover {
  transform: translateY(-8px) scale(1.02);
  background: rgba(255, 255, 255, 0.06) !important;
}

/* Tech Color Profiles (Icons aur card borders par subtle glow) */
.html-glow:hover { border-color: #ff5722 !important; box-shadow: 0 10px 25px rgba(255, 87, 34, 0.15) !important; }
.css-glow:hover { border-color: #2196f3 !important; box-shadow: 0 10px 25px rgba(33, 150, 243, 0.15) !important; }
.bootstrap-glow:hover { border-color: #7952b3 !important; box-shadow: 0 10px 25px rgba(121, 82, 179, 0.15) !important; }
.js-glow:hover { border-color: #ffdf00 !important; box-shadow: 0 10px 25px rgba(255, 223, 0, 0.15) !important; }
.php-glow:hover { border-color: #777bb4 !important; box-shadow: 0 10px 25px rgba(119, 123, 180, 0.15) !important; }
.mysql-glow:hover { border-color: #00758f !important; box-shadow: 0 10px 25px rgba(0, 117, 143, 0.15) !important; }
.python-glow:hover { border-color: #3776ab !important; box-shadow: 0 10px 25px rgba(55, 118, 171, 0.15) !important; }
.mongo-glow:hover { border-color: #47a248 !important; box-shadow: 0 10px 25px rgba(71, 162, 72, 0.15) !important; }
.ccna-glow:hover { border-color: #00b4d8 !important; box-shadow: 0 10px 25px rgba(0, 180, 216, 0.15) !important; }

/* Icons Glow Adjustment */
.skill-card .skill-icon {
  filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.4));
}

/* --- CUSTOM LOWER INDICATORS (DOTS) --- */
.custom-dots {
  position: relative !important;
  margin-top: 35px;
  bottom: 0 !important;
}

.custom-dots button {
  width: 10px !important;
  height: 10px !important;
  border-radius: 50% !important;
  background-color: rgba(255, 255, 255, 0.25) !important;
  border: none !important;
  margin: 0 6px !important;
  transition: all 0.3s ease;
}

.custom-dots .active {
  background-color: #00e5ff !important;
  box-shadow: 0 0 10px #00e5ff;
  transform: scale(1.2);
}</style>
</head>
