<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire Me - G_Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white">

    <div id="header-placeholder"></div>

    <section id="hire-section" class="py-5 mt-5">
        <div class="container" style="max-width: 700px;">
            <div class="text-center mb-5">
                <span style="font-size: 3rem;">🤝</span>
                <h2 class="display-5 fw-bold mt-2" style="color: #00e5ff;">Let's Work Together!</h2>
                <p class="text-muted">Please submite your details if any requirment you have </p>
            </div>

            <form id="hire-form" class="p-4 p-md-5 shadow-lg" style="background-color: #11141a; border-radius: 16px; border-top: 4px solid #00e5ff;">
                
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">Your Name</label>
                        <input type="text" class="form-control bg-dark text-white border-0 py-2" style="border-radius: 8px;" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">Company Name (Optional)</label>
                        <input type="text" class="form-control bg-dark text-white border-0 py-2" style="border-radius: 8px;">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Project Category</label>
                    <select class="form-select bg-dark text-white border-0 py-2" style="border-radius: 8px;" required>
                        <option value="" selected disabled>Select a service...</option>
                        <option value="web">Full-Stack Web Development</option>
                        <option value="ui">UI/UX Layout Design</option>
                        <option value="db">Database Architecture & Management</option>
                        <option value="other">Other Collaboration</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Estimated Budget Bracket</label>
                    <select class="form-select bg-dark text-white border-0 py-2" style="border-radius: 8px;" required>
                        <option value="" selected disabled>Select budget range...</option>
                        <option value="basic">Less than ₹10,000</option>
                        <option value="mid">₹10,000 - ₹50,000</option>
                        <option value="pro">₹50,000+</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Project Details / Job Description</label>
                    <textarea class="form-control bg-dark text-white border-0 py-2" rows="4" placeholder="Briefly describe what you're looking to build or your team requirements..." style="border-radius: 8px;" required></textarea>
                </div>

                <button type="submit" 
                        style="background-color: #00e5ff; color: #11141a; border: 2px solid #00e5ff; width: 100%; padding: 12px; border-radius: 30px; font-weight: bold; transition: all 0.3s;"
                        onmouseover="this.style.backgroundColor='transparent'; this.style.color='#00e5ff';"
                        onmouseout="this.style.backgroundColor='#00e5ff'; this.style.color='#11141a';">
                    Submit Proposal 🚀
                </button>
            </form>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js">
           </script>
</body>
</html>
